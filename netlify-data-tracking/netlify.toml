# Netlify Content Performance Dashboard (external-facing customer view).
# Deploy target: the "Netlify-Data-Tracking" Netlify project.
# If this lives in a subdirectory of the repo, set the project's
# Base directory to "netlify-data-tracking" in Netlify site settings.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/lineage-analytics"
  to = "/.netlify/functions/lineage-analytics"
  status = 200
